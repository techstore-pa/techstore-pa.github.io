<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EG Computer's — Registrar / Ingresar</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="usuario.css">
</head>
<body>

<a href="../index.html" class="back-link">← Volver a la tienda</a>

<div class="card">
  <input class="hidden" type="radio" name="view" id="login" checked>
  <input class="hidden" type="radio" name="view" id="register">
  <input class="hidden" type="radio" name="view" id="forgot">

  <h1>Registrar / Ingresar</h1>

  <nav class="tabs">
    <label for="login">Iniciar sesión</label>
    <label for="register">Crear cuenta</label>
  </nav>

  <div class="panels">

    <div class="panel p-login">
      <div class="field">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email">
      </div>
      <div class="field">
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass">
      </div>
      <button type="button">Iniciar sesión</button>
    </div>

    <div class="panel p-register">
      <div class="field">
        <label for="reg-name">Nombre completo</label>
        <input type="text" id="reg-name">
      </div>
      <div class="field">
        <label for="reg-email">Correo electrónico</label>
        <input type="email" id="reg-email">
      </div>
      <div class="field">
        <label for="reg-pass">Contraseña</label>
        <input type="password" id="reg-pass">
      </div>
      <button type="button">Crear cuenta</button>
    </div>

  </div>
</div>

</body>
</html>
